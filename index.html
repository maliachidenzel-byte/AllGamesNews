</nav><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game News</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVIGATION -->
<nav class="navbar">
  <h2>🎮 Game News</h2>

<script>
function hapticFeedback() {
  if (navigator.vibrate) {
    navigator.vibrate(15); // short vibration
  }
}

// Add haptics to all cards
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', hapticFeedback);
});
</script>  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="#">Mobile</a>
    <a href="#">PC</a>
    <a href="#">Console</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">

  <h1>Latest Gaming News</h1>

  <!-- NEWS GRID (auto-loaded from JSON) -->
  <div class="news-grid" id="news"></div>

</div>

<!-- DYNAMIC LOADER -->
<script>
fetch('./posts.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('news');

    // clear old content
    container.innerHTML = "";

    data.forEach(post => {
      container.innerHTML += `
        <a href="${post.link}" class="card-link">
          <div class="card">
            <h3>${post.title}</h3>
            <p>${post.description}</p>
          </div>
        </a>
      `;
    });
  })
  .catch(err => console.log("Error loading posts:", err));
</script>

</body>
</html>
